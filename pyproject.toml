[build-system]
requires = [
    "hatch-jupyter-builder>=0.5",
    "hatch-nodejs-version>=0.3.2",
    "hatchling>=1.27.0",
    "jupyterlab>=4.0.0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit dependencies.yaml and run `rapids-dependency-file-generator`.
build-backend = "hatchling.build"

[project]
name = "jupyterlab_nvdashboard"
readme = "README.md"
license-files = [
    "LICENSE",
]
requires-python = ">=3.11"
classifiers = [
    "Framework :: Jupyter",
    "Framework :: Jupyter :: JupyterLab",
    "Framework :: Jupyter :: JupyterLab :: 4",
    "Framework :: Jupyter :: JupyterLab :: Extensions",
    "Framework :: Jupyter :: JupyterLab :: Extensions :: Prebuilt",
    "Programming Language :: Python",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "jupyterlab>=4.0.0",
    "nvidia-ml-py>=12",
    "psutil",
    "tornado",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit dependencies.yaml and run `rapids-dependency-file-generator`.
dynamic = ["version", "license", "description", "authors", "urls", "keywords"]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-jupyter[server]>=0.6.0",
] # This list was generated by `rapids-dependency-file-generator`. To make changes, edit dependencies.yaml and run `rapids-dependency-file-generator`.

[tool.hatch.version]
# read from "package.json"
source = "nodejs"

[tool.hatch.metadata.hooks.nodejs]
fields = ["license", "description", "authors", "urls"]

[tool.hatch.build.targets.sdist]
artifacts = ["jupyterlab_nvdashboard/labextension"]
exclude = [".github", "binder"]

[tool.hatch.build.targets.wheel.shared-data]
"jupyterlab_nvdashboard/labextension" = "share/jupyter/labextensions/jupyterlab-nvdashboard"
"install.json" = "share/jupyter/labextensions/jupyterlab-nvdashboard/install.json"
"jupyter-config/server-config" = "etc/jupyter/jupyter_server_config.d"

[tool.hatch.build.hooks.version]
path = "jupyterlab_nvdashboard/_version.py"

[tool.hatch.build.hooks.jupyter-builder]
dependencies = ["hatch-jupyter-builder>=0.5"]
build-function = "hatch_jupyter_builder.npm_builder"
ensured-targets = [
    "jupyterlab_nvdashboard/labextension/static/style.js",
    "jupyterlab_nvdashboard/labextension/package.json",
]
skip-if-exists = ["jupyterlab_nvdashboard/labextension/static/style.js"]

[tool.hatch.build.hooks.jupyter-builder.build-kwargs]
build_cmd = "build:prod"
npm = ["jlpm"]

[tool.hatch.build.hooks.jupyter-builder.editable-build-kwargs]
build_cmd = "install:extension"
npm = ["jlpm"]
source_dir = "src"
build_dir = "jupyterlab_nvdashboard/labextension"

[tool.jupyter-releaser.options]
version_cmd = "hatch version"

[tool.jupyter-releaser.hooks]
before-build-npm = [
    "python -m pip install 'jupyterlab>=4.0.0,<5'",
    "jlpm",
    "jlpm build:prod",
]
before-build-python = ["jlpm clean:all"]

[tool.check-wheel-contents]
ignore = ["W002"]

[tool.pydistcheck]
select = [
    "distro-too-large-compressed",
]

# PyPI hard limit is 1GiB, but try to keep this as small as possible
max_allowed_size_compressed = '10Mi'

[tool.ruff]
line-length = 120
# this should be set to the oldest version of python the project supports
target-version = "py311"

[tool.ruff.lint]
ignore = [
    # (flake8-bugbear) no explicit stacklevel keyword argument found
    "B028"
]

select = [
    # flake8-builtins
    "A",
    # flake8-bugbear
    "B",
    # flake8-comprehensions
    "C4",
    # flake8-datetimez
    "DTZ",
    # pycodestyle
    "E",
    # eradicate
    "ERA",
    # pyflakes
    "F",
    # flynt
    "FLY",
    # perflint
    "PERF",
    # flake8-pie
    "PIE",
    # flake8-pytest-style
    "PT",
    # flake8-pyi
    "PYI",
    # flake8-return
    "RET",
    # ruff-exclusive checks
    "RUF",
    # flake8-bandit
    "S",
    # flake8-simplify
    "SIM",
    # pyupgrade
    "UP",
]

[tool.ruff.lint.per-file-ignores]
"jupyterlab_nvdashboard/tests/*" = [
    # (flake8-bugbear) Found useless expression
    "B018",
    # (flake8-bandit) use of assert detected
    "S101"
]
