name: pr
on:
  push:
    branches:
      - "pull-request/[0-9]+"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions: {}
jobs:
  pr-builder:
    needs:
      - checks
      - conda-python-build
      - conda-python-tests
      - conda-frontend-tests
      - wheel-build
      - wheel-tests
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/pr-builder.yaml@main
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
  checks:
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/checks.yaml@main
    with:
      enable_check_version_files_changed: false
      enable_check_version_against_tag: false
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
  conda-python-build:
    needs: checks
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/conda-python-build.yaml@main
    with:
      build_type: pull-request
      # This selects "ARCH=amd64 + the latest supported Python + CUDA".
      matrix_filter: map(select(.ARCH == "amd64")) | max_by([(.PY_VER|split(".")|map(tonumber)), (.CUDA_VER|split(".")|map(tonumber))]) | [.]
      script: ci/build_python.sh
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
  conda-python-tests:
    needs: conda-python-build
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/conda-python-tests.yaml@main
    with:
      build_type: pull-request
      # This selects "ARCH=amd64 + the latest supported Python".
      matrix_filter: map(select(.ARCH == "amd64")) | max_by([(.PY_VER|split(".")|map(tonumber))]) | [.]
      script: ci/test_python.sh
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
  conda-frontend-tests:
    needs: conda-python-build
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/conda-python-tests.yaml@main
    with:
      build_type: pull-request
      matrix_filter: map(select(.ARCH == "amd64")) | max_by([(.PY_VER|split(".")|map(tonumber))]) | [.]
      script: ci/test_frontend.sh
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
  wheel-build:
    needs: checks
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/wheels-build.yaml@main
    with:
      build_type: pull-request
      # This selects the latest supported Python + CUDA
      matrix_filter: max_by([(.PY_VER|split(".")|map(tonumber)), (.CUDA_VER|split(".")|map(tonumber))]) | [.]
      script: "ci/build_wheel.sh"
      package-name: jupyterlab-nvdashboard
      package-type: python
      pure-wheel: true
      append-cuda-suffix: false
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
  wheel-tests:
    needs: wheel-build
    secrets: inherit # zizmor: ignore[secrets-inherit]
    uses: rapidsai/shared-workflows/.github/workflows/wheels-test.yaml@main
    with:
      build_type: pull-request
      # This selects the latest supported Python
      matrix_filter: max_by([(.PY_VER|split(".")|map(tonumber))]) | [.]
      script: "ci/test_wheel.sh"
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
      pull-requests: read
